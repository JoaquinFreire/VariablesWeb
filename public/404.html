<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>Pagina no encontrada | Variable Web</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fffdfb;
        --text: #625954;
        --text-strong: #111111;
        --accent: #f06603;
        --border: rgba(17, 17, 17, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(255, 115, 0, 0.12), transparent 30%),
          linear-gradient(180deg, #ffffff 0%, #fff7f0 48%, #fffdfb 100%);
        font-family: "Segoe UI", "Trebuchet MS", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
      }

      .shell {
        width: min(100%, 760px);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px rgba(17, 17, 17, 0.1);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #db5d00;
      }

      .eyebrow::before {
        content: "";
        width: 40px;
        height: 1px;
        background: currentColor;
      }

      h1 {
        margin: 0 0 14px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.2rem, 6vw, 4.4rem);
        line-height: 0.98;
        letter-spacing: -0.04em;
        color: var(--text-strong);
      }

      p {
        margin: 0;
        max-width: 58ch;
        line-height: 1.75;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 20px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .primary {
        background: linear-gradient(135deg, #ff7a00, #ff5a00);
        color: #fff;
      }

      .secondary {
        background: rgba(255, 255, 255, 0.9);
        color: var(--text-strong);
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <span class="eyebrow">Variable Web</span>
      <h1>Esta pagina no existe o cambio de lugar.</h1>
      <p>
        Lo que buscabas no se pudo encontrar. Puedes volver al inicio, visitar el blog
        o escribirnos para ayudarte a llegar a la seccion correcta.
      </p>
      <div class="actions">
        <a class="primary" href="/">Ir al inicio</a>
        <a class="secondary" href="/blog">Ver blog</a>
        <a class="secondary" href="/#contacto">Contactar</a>
      </div>
    </main>
  </body>
  </html>
